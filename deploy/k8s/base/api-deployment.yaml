apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent33-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent33-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent33-api
    spec:
      containers:
        - name: api
          image: agent33:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: agent33-api-config
            - secretRef:
                name: agent33-api-secrets
            - secretRef:
                name: agent33-postgres-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
