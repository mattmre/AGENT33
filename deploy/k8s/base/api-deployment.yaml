apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent33-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent33-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent33-api
    spec:
      containers:
        - name: api
          image: agent33:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: agent33-api-config
            - secretRef:
                name: agent33-api-secrets
            - secretRef:
                name: agent33-postgres-secrets
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import json
                  import sys
                  import urllib.request
                  with urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5) as response:
                      payload = json.load(response)
                  sys.exit(0 if payload.get("status") == "healthy" else 1)
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - |
                  import json
                  import sys
                  import urllib.request
                  with urllib.request.urlopen("http://127.0.0.1:8000/health", timeout=5) as response:
                      payload = json.load(response)
                  sys.exit(0 if payload.get("status") == "healthy" else 1)
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
